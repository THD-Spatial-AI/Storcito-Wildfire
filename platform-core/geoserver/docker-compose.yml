services:
  geoserver:
    image: kartoza/geoserver:2.25.2
    container_name: geoserver
    ports:
      - "8180:8080"
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_USERNAME:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_PASSWORD:-geoserver}
      STABLE_EXTENSIONS: wps,csw
      COMMUNITY_EXTENSIONS: ogcapi-features,ogcapi-maps,ogcapi-tiles
    volumes:
      - geoserver-data:/opt/geoserver/data_dir
      - ../../wildfire-app/backend/storage/data:/opt/geoserver/data_dir/data/results
    networks:
      - spatialhub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/geoserver/web/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  geoserver-data:

networks:
  spatialhub-net:
    external: true
