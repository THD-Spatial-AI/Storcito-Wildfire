<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Sleek pad-mounted transformer -->

  <!-- Body -->
  <rect x="4" y="6" width="16" height="13" rx="2" fill="white" opacity="0.95"/>

  <!-- Top cap -->
  <rect x="3" y="5" width="18" height="3" rx="1.2" fill="white"/>

  <!-- Base plate -->
  <rect x="3" y="18" width="18" height="2.5" rx="1" fill="white" opacity="0.85"/>

  <!-- HV bushings -->
  <rect x="7.5" y="2" width="1.4" height="4" rx="0.7" fill="white" opacity="0.9"/>
  <rect x="11.3" y="2" width="1.4" height="4" rx="0.7" fill="white" opacity="0.9"/>
  <rect x="15.1" y="2" width="1.4" height="4" rx="0.7" fill="white" opacity="0.9"/>

  <!-- Bushing caps -->
  <circle cx="8.2" cy="2" r="0.9" fill="white"/>
  <circle cx="12" cy="2" r="0.9" fill="white"/>
  <circle cx="15.8" cy="2" r="0.9" fill="white"/>

  <!-- Panel lines -->
  <line x1="8" y1="8.5" x2="8" y2="17.5" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="8.5" x2="16" y2="17.5" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <!-- Lightning bolt symbol -->
  <path d="M13 9 L11 13 L12.5 13 L11 17 L14.5 12 L12.8 12 L14 9 Z" fill="white" opacity="0.5"/>
</svg>
